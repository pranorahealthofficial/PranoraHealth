<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post — PranoraHealth</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Yatra+One&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .post-wrap{max-width:820px;margin:0 auto;padding:2.5rem 2rem;}
    .post-header{margin-bottom:1.5rem;}
    .post-feat-img{width:100%;height:380px;object-fit:cover;border-radius:14px;margin-bottom:1.8rem;box-shadow:0 8px 30px var(--shadow-lg);}
    .post-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;color:var(--green);line-height:1.2;margin-bottom:.4rem;}
    .post-hindi{font-family:'Yatra One',serif;font-size:1rem;color:var(--gold-dark);margin-bottom:.8rem;}
    .post-meta{display:flex;gap:1rem;flex-wrap:wrap;font-size:.8rem;color:#888;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--cream-dark);}
    .post-content{font-size:.97rem;line-height:1.9;color:var(--text-dark);}
    .post-content h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--green);margin:1.5rem 0 .6rem;}
    .post-content p{margin-bottom:1rem;}
    .post-content ul,.post-content ol{padding-left:1.5rem;margin-bottom:1rem;}
    .post-content li{margin-bottom:.4rem;}
    .post-content blockquote{border-left:4px solid var(--gold);padding:.8rem 1.2rem;background:var(--cream-dark);border-radius:0 8px 8px 0;margin:1rem 0;font-style:italic;color:var(--text-mid);}
    .post-content strong{color:var(--green);}
    .share-row{display:flex;gap:.7rem;margin:2rem 0;flex-wrap:wrap;}
    .share-btn{padding:.45rem 1rem;border-radius:20px;border:none;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
    .comments-section{margin-top:2.5rem;padding-top:2rem;border-top:2px solid var(--cream-dark);}
    .comments-section h3{font-family:'Cormorant Garamond',serif;color:var(--green);font-size:1.2rem;margin-bottom:1.2rem;}
    .comment-card{background:var(--cream-dark);border-radius:10px;padding:1rem;margin-bottom:.8rem;}
    .comment-card .c-name{font-weight:700;color:var(--green);font-size:.88rem;}
    .comment-card .c-text{font-size:.85rem;color:var(--text-mid);margin-top:.3rem;line-height:1.6;}
    .comment-card .c-date{font-size:.72rem;color:#aaa;margin-top:.3rem;}
  </style>
</head>
<body>
<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="1760520800681.png" alt="PranoraHealth" class="logo-img"/>
    <div class="logo-text"><span class="logo-main">Pranora<span>Health</span></span><span class="logo-sub">प्राकृतिक स्वास्थ्य</span></div>
  </a>
  <div class="nav-links"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="blog.html" class="active">Blog</a></div>
  <div class="nav-right"><a href="cart.html" class="cart-btn">🛒 <span id="cartCount">0</span></a><div id="userNav"></div></div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">🏠 Home</a>
  <a href="shop.html">🛒 Shop</a>
  <a href="blog.html">📝 Blog</a>
  <a href="#about">ℹ️ About</a>
  <a href="#contact">📞 Contact</a>
  <a href="login.html">👤 Login / Account</a>
  <a href="cart.html">🛒 Cart</a>
</div>
<script>
function toggleMenu(){
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('mobileMenu').classList.toggle('open');
}
</script>

<div class="post-wrap">
  <div class="breadcrumb" style="margin-bottom:1.5rem;"><a href="index.html">Home</a> › <a href="blog.html">Blog</a> › Article</div>
  <div id="postContent"><div style="text-align:center;padding:4rem;color:#888;">Loading post...</div></div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const postId = new URLSearchParams(location.search).get('id');

async function loadPost() {
  if(!postId) { document.getElementById('postContent').innerHTML='<p>Post not found!</p>'; return; }
  const post = await getPost(postId);
  if(!post) { document.getElementById('postContent').innerHTML='<p>Post not found!</p>'; return; }
  document.title = post.title + ' — PranoraHealth';
  document.getElementById('postContent').innerHTML = `
    ${post.image?`<img src="${post.image}" alt="${post.title}" class="post-feat-img"/>`:''}
    <div class="post-header">
      <span class="blog-tag">🌿 ${post.category||'Health'}</span>
      <h1 class="post-title">${post.title}</h1>
      ${post.title_hindi?`<div class="post-hindi">${post.title_hindi}</div>`:''}
      <div class="post-meta">
        ${post.author?`<span>✍️ ${post.author}</span>`:''}
        <span>📅 ${new Date(post.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</span>
        <span>👁️ ${post.views||0} views</span>
      </div>
    </div>
    <div class="post-content">${post.content}</div>
    <div class="share-row">
      <button class="share-btn" style="background:#25D366;color:white;" onclick="shareWA()">📱 WhatsApp</button>
      <button class="share-btn" style="background:var(--cream-dark);color:var(--green);" onclick="copyLink()">🔗 Copy Link</button>
    </div>
    <div class="comments-section">
      <h3>💬 Comments</h3>
      <div id="commentsList"></div>
      <div class="form-card" style="margin-top:1.2rem;">
        <h4 style="font-family:'Cormorant Garamond',serif;color:var(--green);margin-bottom:1rem;">Add a Comment</h4>
        <div class="form-2col">
          <div class="form-group"><label>Your Name*</label><input type="text" id="cmtName" placeholder="Aapka naam"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="cmtEmail" placeholder="your@email.com"/></div>
        </div>
        <div class="form-group"><label>Comment*</label><textarea id="cmtText" placeholder="Your comment..." style="min-height:80px;"></textarea></div>
        <button class="btn-gold" onclick="submitComment()">Post Comment 🌿</button>
      </div>
    </div>`;
  loadComments();
}

async function loadComments() {
  const comments = await getComments(postId);
  const el = document.getElementById('commentsList');
  if(!el) return;
  if(!comments.length) { el.innerHTML='<p style="color:#888;font-size:.85rem;">Be the first to comment! 🌿</p>'; return; }
  el.innerHTML = comments.map(c=>`
    <div class="comment-card">
      <div class="c-name">👤 ${c.user_name||'Anonymous'}</div>
      <div class="c-text">${c.content}</div>
      <div class="c-date">${new Date(c.created_at).toLocaleDateString('en-IN')}</div>
    </div>`).join('');
}

async function submitComment() {
  const name=document.getElementById('cmtName').value.trim();
  const email=document.getElementById('cmtEmail').value.trim();
  const text=document.getElementById('cmtText').value.trim();
  if(!name||!text){showToast('❌ Please fill name and comment!');return;}
  try {
    await addComment(postId,name,email,text);
    showToast('✅ Comment posted! 🌿');
    document.getElementById('cmtName').value='';
    document.getElementById('cmtEmail').value='';
    document.getElementById('cmtText').value='';
    loadComments();
  } catch(e){showToast('❌ Error: '+e.message);}
}

function shareWA(){window.open(`https://wa.me/?text=${encodeURIComponent(document.title+' - '+location.href)}`);}
function copyLink(){navigator.clipboard.writeText(location.href);showToast('🔗 Link copied!');}

loadPost();
renderUserNav();
updateCartCount();
</script>
</body>
</html>
