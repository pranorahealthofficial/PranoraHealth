<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — PranoraHealth</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Yatra+One&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="1760520800681.png" alt="PranoraHealth" class="logo-img"/>
    <div class="logo-text"><span class="logo-main">Pranora<span>Health</span></span><span class="logo-sub">प्राकृतिक स्वास्थ्य</span></div>
  </a>
  <div class="nav-links"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="blog.html">Blog</a></div>
  <div class="nav-right"><a href="cart.html" class="cart-btn">🛒 <span id="cartCount">0</span></a><div id="userNav"></div></div>
</nav>

<div class="page-hero">
  <h1>My Cart 🛒</h1>
  <div class="breadcrumb"><a href="index.html">Home</a> › <a href="shop.html">Shop</a> › Cart</div>
</div>

<div class="cart-wrap section">
  <div id="cartItems"></div>
  <div id="emptyCart" style="display:none;text-align:center;padding:3rem;">
    <p style="font-size:3rem;">🛒</p>
    <p style="color:#888;margin-bottom:1rem;">Your cart is empty!</p>
    <a href="shop.html" class="btn-gold">Shop Now →</a>
  </div>
  <div class="cart-total-box" id="cartTotalBox" style="display:none;">
    <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
      <span style="font-weight:600;">Subtotal:</span><span id="subtotalAmt" style="font-weight:700;color:var(--green);font-family:'Cormorant Garamond',serif;font-size:1.2rem;"></span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
      <span>Shipping:</span><span style="color:var(--green);font-weight:700;" id="shippingAmt"></span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:1.2rem;padding-top:.8rem;border-top:2px solid var(--cream-dark);">
      <strong>Total:</strong><strong id="totalAmt" style="color:var(--gold-dark);font-family:'Cormorant Garamond',serif;font-size:1.4rem;"></strong>
    </div>
    <button class="btn-gold" style="width:100%;font-size:1rem;" onclick="checkout()">Proceed to Checkout →</button>
  </div>

  <!-- CHECKOUT FORM -->
  <div id="checkoutForm" style="display:none;margin-top:1.5rem;">
    <div class="form-card">
      <h3 style="font-family:'Cormorant Garamond',serif;color:var(--green);font-size:1.2rem;margin-bottom:1.2rem;">📦 Delivery Details</h3>
      <div class="form-2col">
        <div class="form-group"><label>Full Name*</label><input type="text" id="oName" placeholder="Aapka naam"/></div>
        <div class="form-group"><label>Phone Number*</label><input type="tel" id="oPhone" placeholder="+91 98765 43210"/></div>
      </div>
      <div class="form-group"><label>Email*</label><input type="email" id="oEmail" placeholder="your@email.com"/></div>
      <div class="form-group"><label>Full Address*</label><textarea id="oAddress" placeholder="House no., Street, City, State, PIN..." style="min-height:80px;"></textarea></div>
      <div class="error-box" id="orderErr"></div>
      <div class="success-box" id="orderOk"></div>
      <div style="display:flex;gap:1rem;margin-top:.5rem;">
        <button class="btn-gold" onclick="placeOrderNow()">✅ Place Order (COD)</button>
        <button class="btn-green" onclick="document.getElementById('checkoutForm').style.display='none'">Back</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
function renderCart() {
  const cart = getCart();
  const el = document.getElementById('cartItems');
  const empty = document.getElementById('emptyCart');
  const totalBox = document.getElementById('cartTotalBox');
  if (!cart.length) { el.innerHTML=''; empty.style.display='block'; totalBox.style.display='none'; return; }
  empty.style.display='none'; totalBox.style.display='block';
  el.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img src="${item.image||'https://images.unsplash.com/photo-1611021061285-c3f6e3f5e8d2?w=200'}" alt="${item.name}"/>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        ${item.nameHi?`<div style="font-family:'Yatra One',serif;font-size:.78rem;color:var(--gold-dark);">${item.nameHi}</div>`:''}
        <div class="cart-item-price">₹${item.price} × ${item.qty} = ₹${item.price*item.qty}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:.4rem;">
        <div class="qty-wrap" style="margin:0;">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
        <button onclick="removeFromCart(${item.id});renderCart();" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:.78rem;font-weight:700;">Remove</button>
      </div>
    </div>`).join('');
  const subtotal = cartTotal();
  const shipping = subtotal >= 499 ? 0 : 60;
  document.getElementById('subtotalAmt').textContent = '₹'+subtotal;
  document.getElementById('shippingAmt').textContent = shipping===0 ? 'FREE 🎉' : '₹'+shipping;
  document.getElementById('totalAmt').textContent = '₹'+(subtotal+shipping);
}

function changeQty(id, delta) {
  const cart = getCart();
  const idx = cart.findIndex(i=>i.id==id);
  if(idx<0) return;
  cart[idx].qty += delta;
  if(cart[idx].qty<=0) cart.splice(idx,1);
  saveCart(cart);
  renderCart();
}

function checkout() {
  const user = getUser();
  document.getElementById('checkoutForm').style.display='block';
  document.getElementById('cartTotalBox').scrollIntoView({behavior:'smooth'});
}

async function placeOrderNow() {
  const name=document.getElementById('oName').value.trim();
  const phone=document.getElementById('oPhone').value.trim();
  const email=document.getElementById('oEmail').value.trim();
  const address=document.getElementById('oAddress').value.trim();
  const err=document.getElementById('orderErr');
  const ok=document.getElementById('orderOk');
  err.classList.remove('show'); ok.classList.remove('show');
  if(!name||!phone||!email||!address){err.textContent='Please fill all fields!';err.classList.add('show');return;}
  const cart=getCart();
  const subtotal=cartTotal();
  const shipping=subtotal>=499?0:60;
  try {
    await placeOrder({ user_name:name, user_phone:phone, user_email:email, user_address:address, items:JSON.stringify(cart), total:subtotal+shipping, status:'pending' });
    saveCart([]);
    ok.textContent='🎉 Order placed successfully! We will contact you soon.';
    ok.classList.add('show');
    renderCart();
    setTimeout(()=>{window.location.href='index.html';},2500);
  } catch(e){err.textContent='❌ Error: '+e.message;err.classList.add('show');}
}

renderCart();
renderUserNav();
updateCartCount();
</script>
</body>
</html>
