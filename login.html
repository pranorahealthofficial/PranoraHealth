<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PranoraHealth</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Yatra+One&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="1760520800681.png" alt="PranoraHealth" class="logo-img"/>
    <div class="logo-text">
      <span class="logo-main">Pranora<span>Health</span></span>
      <span class="logo-sub">प्राकृतिक स्वास्थ्य</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="blog.html">Blog</a>
  </div>
  <div class="nav-right">
    <a href="login.html" class="nav-login-btn">Login / Register</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="1760520800681.png" alt="PranoraHealth"/>
      <h2>Welcome to PranoraHealth</h2>
      <p style="font-size:.82rem;color:#888;">Natural Health & Wellness</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- LOGIN -->
    <div class="tab-pane active" id="loginPane">
      <div class="error-box" id="loginErr"></div>
      <div class="success-box" id="loginOk"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter password"/>
      </div>
      <button class="btn-gold" style="width:100%;margin-top:.5rem;" onclick="doLogin()">Login 🌿</button>
      <p style="text-align:center;margin-top:1rem;font-size:.82rem;color:#888;">
        New user? <a href="#" onclick="switchTab('register')" style="color:var(--green);font-weight:700;">Create account</a>
      </p>
    </div>

    <!-- REGISTER -->
    <div class="tab-pane" id="registerPane">
      <div class="error-box" id="regErr"></div>
      <div class="success-box" id="regOk"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Aapka naam"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Password (min 6 characters)</label>
        <input type="password" id="regPass" placeholder="Strong password"/>
      </div>
      <button class="btn-gold" style="width:100%;margin-top:.5rem;" onclick="doRegister()">Create Account 🌿</button>
      <p style="text-align:center;margin-top:1rem;font-size:.82rem;color:#888;">
        Already have account? <a href="#" onclick="switchTab('login')" style="color:var(--green);font-weight:700;">Login</a>
      </p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Supabase FIRST, then app.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // Supabase setup directly here
  const SUPA_URL = 'https://atdhhsqommyfdoajrcwu.supabase.co';
  const SUPA_KEY = 'sb_publishable_0-PwYxjTiT-LJDCZOgyNTQ_Dl1FhlE9';
  const _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => {
      t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
    });
    document.getElementById('loginPane').classList.toggle('active', tab==='login');
    document.getElementById('registerPane').classList.toggle('active', tab==='register');
  }

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = (type==='ok' ? 'success-box' : 'error-box') + ' show';
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) { showMsg('loginErr','Please fill all fields!','err'); return; }
    document.getElementById('loginErr').className='error-box';
    document.getElementById('loginOk').className='success-box';
    try {
      const { data, error } = await _supa.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      // Check role
      const { data: profile } = await _supa.from('profiles').select('role').eq('id', data.user.id).single();
      showMsg('loginOk', '✅ Login successful! Redirecting...', 'ok');
      setTimeout(() => {
        window.location.href = profile?.role === 'admin' ? 'admin.html' : 'index.html';
      }, 1200);
    } catch(e) {
      showMsg('loginErr', '❌ ' + (e.message || 'Login failed!'), 'err');
    }
  }

  async function doRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!name||!email||!pass) { showMsg('regErr','Please fill all fields!','err'); return; }
    if (pass.length < 6)      { showMsg('regErr','Password must be 6+ characters','err'); return; }
    document.getElementById('regErr').className='error-box';
    document.getElementById('regOk').className='success-box';
    try {
      const { data, error } = await _supa.auth.signUp({ email, password: pass, options:{ data:{ name } } });
      if (error) throw error;
      if (data.user) {
        await _supa.from('profiles').upsert({ id: data.user.id, name, email, role: 'user' });
      }
      showMsg('regOk', '✅ Account created! Check email to confirm.', 'ok');
    } catch(e) {
      showMsg('regErr', '❌ ' + (e.message || 'Registration failed!'), 'err');
    }
  }

  // Redirect if already logged in
  _supa.auth.getUser().then(({ data }) => {
    if (data?.user) window.location.href = 'index.html';
  });
</script>
</body>
</html>
