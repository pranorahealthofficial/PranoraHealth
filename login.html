<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PranoraHealth</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Yatra+One&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="1760520800681.png" alt="PranoraHealth" class="logo-img"/>
    <div class="logo-text"><span class="logo-main">Pranora<span>Health</span></span><span class="logo-sub">प्राकृतिक स्वास्थ्य</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="blog.html">Blog</a>
  </div>
  <div class="nav-right"><div id="userNav"></div></div>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="1760520800681.png" alt="PranoraHealth"/>
      <h2>Welcome to PranoraHealth</h2>
      <p style="font-size:.82rem;color:#888;">Natural Health & Wellness</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- LOGIN -->
    <div class="tab-pane active" id="loginPane">
      <div class="error-box" id="loginErr"></div>
      <div class="success-box" id="loginOk"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter password" onkeypress="if(event.key==='Enter') doLogin()"/>
      </div>
      <button class="btn-gold" style="width:100%;margin-top:.5rem;" onclick="doLogin()">Login 🌿</button>
      <p style="text-align:center;margin-top:1rem;font-size:.82rem;color:#888;">
        New user? <a href="#" onclick="switchTab('register')" style="color:var(--green);font-weight:700;">Create account</a>
      </p>
    </div>

    <!-- REGISTER -->
    <div class="tab-pane" id="registerPane">
      <div class="error-box" id="regErr"></div>
      <div class="success-box" id="regOk"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Aapka naam"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Password (min 6 characters)</label>
        <input type="password" id="regPass" placeholder="Strong password"/>
      </div>
      <button class="btn-gold" style="width:100%;margin-top:.5rem;" onclick="doRegister()">Create Account 🌿</button>
      <p style="text-align:center;margin-top:1rem;font-size:.82rem;color:#888;">
        Already have account? <a href="#" onclick="switchTab('login')" style="color:var(--green);font-weight:700;">Login</a>
      </p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('loginPane').classList.toggle('active', tab==='login');
    document.getElementById('registerPane').classList.toggle('active', tab==='register');
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const err = document.getElementById('loginErr');
    const ok = document.getElementById('loginOk');
    err.classList.remove('show'); ok.classList.remove('show');
    if (!email || !pass) { err.textContent='Please fill all fields'; err.classList.add('show'); return; }
    try {
      const { user } = await signIn(email, pass);
      // Check if admin
      const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single();
      ok.textContent = '✅ Login successful! Redirecting...'; ok.classList.add('show');
      setTimeout(() => { window.location.href = profile?.role === 'admin' ? 'admin.html' : 'index.html'; }, 1200);
    } catch(e) {
      err.textContent = '❌ ' + (e.message || 'Login failed. Check credentials.');
      err.classList.add('show');
    }
  }

  async function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    const err = document.getElementById('regErr');
    const ok = document.getElementById('regOk');
    err.classList.remove('show'); ok.classList.remove('show');
    if (!name || !email || !pass) { err.textContent='Please fill all fields'; err.classList.add('show'); return; }
    if (pass.length < 6) { err.textContent='Password must be 6+ characters'; err.classList.add('show'); return; }
    try {
      await signUp(email, pass, name);
      ok.textContent = '✅ Account created! Please check your email to confirm.';
      ok.classList.add('show');
      // Save profile
      const user = await getUser();
      if (user) await supabase.from('profiles').upsert({ id: user.id, name, email, role: 'user' });
    } catch(e) {
      err.textContent = '❌ ' + (e.message || 'Registration failed.');
      err.classList.add('show');
    }
  }

  // Redirect if already logged in
  getUser().then(u => { if(u) window.location.href='index.html'; });
  renderUserNav();
</script>
</body>
</html>
